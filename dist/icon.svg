<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="claw" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#f97316" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  
  <!-- Subtle glow behind claw -->
  <ellipse cx="256" cy="280" rx="120" ry="100" fill="url(#glow)" opacity="0.3"/>
  
  <!-- Lobster claw - left pincer -->
  <g filter="url(#shadow)" transform="translate(256,240)">
    <!-- Left pincer -->
    <path d="M-20,-80 C-60,-120 -110,-100 -100,-50 C-95,-20 -70,10 -30,20 L-10,0 Z" 
          fill="url(#claw)" stroke="#c2410c" stroke-width="3"/>
    <!-- Right pincer -->
    <path d="M20,-80 C60,-120 110,-100 100,-50 C95,-20 70,10 30,20 L10,0 Z" 
          fill="url(#claw)" stroke="#c2410c" stroke-width="3"/>
    <!-- Base/joint -->
    <ellipse cx="0" cy="15" rx="35" ry="25" fill="#ea580c" stroke="#c2410c" stroke-width="3"/>
    <!-- Inner claw detail -->
    <path d="M-8,-10 L-8,-60" stroke="#fdba74" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <path d="M8,-10 L8,-60" stroke="#fdba74" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  </g>
  
  <!-- Log lines (document/scroll) held in claw -->
  <g transform="translate(256,310)" opacity="0.9">
    <rect x="-50" y="0" width="100" height="8" rx="4" fill="#34d399"/>
    <rect x="-40" y="16" width="80" height="6" rx="3" fill="#34d399" opacity="0.6"/>
    <rect x="-45" y="30" width="90" height="6" rx="3" fill="#34d399" opacity="0.4"/>
    <rect x="-35" y="44" width="70" height="6" rx="3" fill="#34d399" opacity="0.25"/>
  </g>
  
  <!-- Terminal cursor blink -->
  <rect x="312" y="310" width="3" height="8" rx="1" fill="#34d399" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0;0.8" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
